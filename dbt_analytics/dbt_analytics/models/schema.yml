version: 2

# ═══════════════════════════════════════════════════════════
# SOURCES — Raw BigQuery tables loaded by Airflow
# ═══════════════════════════════════════════════════════════

sources:
  - name: ecommerce_retails
    database: jcdeah-007
    schema: finalproject_rakhajidhan_ecommerce_retails
    description: "Raw retail e-commerce data loaded from PostgreSQL via Airflow"
    tables:
      - name: customers
        description: "Customer master data"
        columns:
          - name: customer_id
            description: "Unique customer identifier"
            tests: [unique, not_null]
          - name: email
            description: "Customer email (unique)"
            tests: [unique, not_null]
      - name: products
        description: "Product catalog"
        columns:
          - name: product_id
            description: "Unique product identifier"
            tests: [unique, not_null]
      - name: purchase
        description: "Purchase transactions"
        columns:
          - name: purchase_id
            description: "Unique purchase identifier"
            tests: [unique, not_null]

  - name: ny_taxi
    database: jcdeah-007
    schema: finalproject_rakhajidhan_ny_taxi_preparation
    description: "NYC Green Taxi trip data loaded from GCS parquet files"
    tables:
      - name: green_tripdata
        description: "Green taxi trip records partitioned by run_date"
        columns:
          - name: run_date
            tests: [not_null]

  - name: pubsub_retail
    database: jcdeah-007
    schema: finalproject_rakhajidhan_pubsub_retail
    description: "Streaming retail transactions from Google Pub/Sub"
    tables:
      - name: retail_transactions_streaming
        description: "Real-time retail transactions ingested via Pub/Sub subscriber"
        columns:
          - name: transaction_id
            tests: [not_null]

  - name: mahkamah_agung
    database: jcdeah-007
    schema: finalproject_rakhajidhan_mahkamahagung
    description: "Scraped Mahkamah Agung court decisions and PDF details"
    tables:
      - name: putusan_list
        description: "Court decision listing and detail metadata"
        columns:
          - name: nomor
            tests: [not_null]
      - name: putusan_pdf_detail
        description: "Extracted text from court decision PDF documents"
        columns:
          - name: nomor
            tests: [not_null]

  - name: adakami
    database: jcdeah-007
    schema: finalproject_rakhajidhan_adakami
    description: "Adakami statistics API data scraped daily"
    tables:
      - name: prep_adakami_statistics
        description: "Daily Adakami platform statistics"


# ═══════════════════════════════════════════════════════════
# MODELS
# ═══════════════════════════════════════════════════════════

models:

  # ───────────────────────────────────────────────────────
  # STAGING — Project 1: Retail
  # ───────────────────────────────────────────────────────

  - name: stg_p1_customers
    description: "Staging — Cleaned customer data from retail database"
    columns:
      - name: customer_id
        description: "Unique customer identifier"
        tests: [unique, not_null]
      - name: name
        description: "Customer full name"
        tests: [not_null]
      - name: email
        description: "Customer email address"
        tests: [unique, not_null]
      - name: city
        description: "Customer city"
      - name: created_at
        description: "Record creation timestamp"
      - name: updated_at
        description: "Record last updated timestamp"

  - name: stg_p1_products
    description: "Staging — Cleaned product catalog"
    columns:
      - name: product_id
        description: "Unique product identifier"
        tests: [unique, not_null]
      - name: product_name
        description: "Product name"
        tests: [not_null]
      - name: category
        description: "Product category (Electronics, Fashion, Accessories)"
      - name: price
        description: "Unit price in IDR"
        tests: [not_null]

  - name: stg_p1_purchases
    description: "Staging — Purchase transaction records"
    columns:
      - name: purchase_id
        description: "Unique purchase identifier"
        tests: [unique, not_null]
      - name: customer_id
        description: "Foreign key to customers"
        tests: [not_null]
      - name: product_id
        description: "Foreign key to products"
        tests: [not_null]
      - name: quantity
        description: "Number of units purchased"
        tests: [not_null]

  # ───────────────────────────────────────────────────────
  # STAGING — Project 2: NYC Green Taxi
  # ───────────────────────────────────────────────────────

  - name: stg_p2_taxi_trips
    description: "Staging — NYC Green Taxi trip data cleaned from raw GCS parquet"
    columns:
      - name: VendorID
        description: "Taxi vendor identifier (1 = Creative Mobile, 2 = VeriFone)"
      - name: lpep_pickup_datetime
        description: "Pickup date and time"
      - name: lpep_dropoff_datetime
        description: "Dropoff date and time"
      - name: trip_distance
        description: "Trip distance in miles"
      - name: fare_amount
        description: "Base fare amount in USD"
      - name: total_amount
        description: "Total fare including all charges"
      - name: run_date
        description: "Partition date when data was loaded"
        tests: [not_null]

  # ───────────────────────────────────────────────────────
  # STAGING — Project 3: Pub/Sub Streaming
  # ───────────────────────────────────────────────────────

  - name: stg_p3_transactions
    description: "Staging — Pub/Sub streaming retail transactions"
    columns:
      - name: transaction_id
        description: "Unique transaction identifier"
        tests: [unique, not_null]
      - name: event_type
        description: "Event type (e.g. purchase)"
      - name: customer_id
        description: "Customer who made the purchase"
        tests: [not_null]
      - name: product_id
        description: "Product purchased"
        tests: [not_null]
      - name: total_amount
        description: "Total transaction amount in IDR"
      - name: payment_method
        description: "Payment method used"
      - name: status
        description: "Transaction status (completed, pending, cancelled)"
      - name: run_date
        description: "Partition date when data was ingested"

  # ───────────────────────────────────────────────────────
  # STAGING — Mahkamah Agung
  # ───────────────────────────────────────────────────────

  - name: stg_ma_putusan_list
    description: "Staging — Mahkamah Agung putusan (court decisions) listing and detail metadata"
    columns:
      - name: nomor
        description: "Unique putusan number (e.g. 6578 K/PID.SUS/2025)"
        tests: [unique, not_null]
      - name: judul
        description: "Full title of the putusan"
      - name: tahun
        description: "Year of the putusan"
      - name: bulan
        description: "Month of the putusan"
      - name: tingkat_proses
        description: "Court level (Kasasi, Banding, etc.)"
      - name: lembaga_peradilan
        description: "Court institution name"
      - name: amar
        description: "Court verdict (Tolak, Kabul, etc.)"
      - name: kategori
        description: "Category (All — front-page scrape)"
      - name: run_date
        description: "Partition date when data was scraped"
        tests: [not_null]

  - name: stg_ma_pdf_detail
    description: "Staging — Extracted PDF content from Mahkamah Agung putusan documents"
    columns:
      - name: nomor
        description: "Putusan number — joins to stg_ma_putusan_list"
        tests: [not_null]
      - name: gcs_uri
        description: "Google Cloud Storage URI of the PDF file"
      - name: pdf_pages
        description: "Number of pages in the PDF"
      - name: pdf_pihak
        description: "Parties involved extracted from PDF"
      - name: pdf_isi_ringkas
        description: "Summary/Duduk Perkara section extracted from PDF"
      - name: pdf_dasar_hukum
        description: "Legal basis section extracted from PDF"
      - name: pdf_amar_putusan
        description: "Verdict/Amar section extracted from PDF"
      - name: run_date
        description: "Partition date"
        tests: [not_null]

  # ───────────────────────────────────────────────────────
  # STAGING — Adakami
  # ───────────────────────────────────────────────────────

  - name: stg_adakami_stats
    description: "Staging — Adakami platform statistics scraped daily from API"

  # ───────────────────────────────────────────────────────
  # MARTS
  # ───────────────────────────────────────────────────────

  - name: mart_p1_sales
    description: >
      Mart — Complete sales transactions joining purchase, customer, and product data.
      One row per purchase with all relevant attributes for analysis.
    columns:
      - name: purchase_id
        description: "Unique purchase identifier"
        tests: [unique, not_null]
      - name: customer_id
        description: "Customer identifier"
        tests: [not_null]
      - name: customer_name
        description: "Customer full name"
      - name: customer_city
        description: "Customer city"
      - name: customer_email
        description: "Customer email"
      - name: product_id
        description: "Product identifier"
        tests: [not_null]
      - name: product_name
        description: "Product name"
      - name: product_category
        description: "Product category"
      - name: unit_price
        description: "Unit price in IDR"
      - name: quantity
        description: "Quantity purchased"
      - name: total_amount
        description: "Total transaction value (unit_price × quantity)"
        tests: [not_null]
      - name: purchase_date
        description: "Date and time of purchase"
      - name: dbt_loaded_at
        description: "Timestamp when dbt loaded this row"

  - name: mart_p2_taxi_daily
    description: >
      Mart — Daily NYC Green Taxi metrics aggregated by date and vendor.
      Suitable for trend analysis and revenue reporting.
    columns:
      - name: trip_date
        description: "Date of trips"
        tests: [not_null]
      - name: VendorID
        description: "Taxi vendor identifier"
      - name: num_trips
        description: "Total number of trips"
      - name: avg_passengers
        description: "Average passenger count per trip"
      - name: avg_distance
        description: "Average trip distance in miles"
      - name: avg_fare
        description: "Average base fare"
      - name: avg_total
        description: "Average total amount including all charges"
      - name: total_revenue
        description: "Total revenue for the day and vendor"
      - name: dbt_loaded_at
        description: "Timestamp when dbt loaded this row"

  - name: mart_p3_transaction_daily
    description: >
      Mart — Daily Pub/Sub streaming transaction summary grouped by customer,
      product category, payment method, and status.
    columns:
      - name: run_date
        description: "Date of transactions"
        tests: [not_null]
      - name: customer_id
        description: "Customer identifier"
      - name: customer_name
        description: "Customer name"
      - name: customer_city
        description: "Customer city"
      - name: product_category
        description: "Product category"
      - name: payment_method
        description: "Payment method used"
      - name: status
        description: "Transaction status"
      - name: num_transactions
        description: "Count of transactions in this group"
      - name: avg_quantity
        description: "Average quantity per transaction"
      - name: avg_amount
        description: "Average transaction amount"
      - name: total_revenue
        description: "Total revenue for this group"
      - name: dbt_loaded_at
        description: "Timestamp when dbt loaded this row"

  - name: mart_ma_putusan
    description: >
      Mart — Complete Mahkamah Agung putusan combining listing metadata
      with extracted PDF content. One row per unique putusan nomor.
    columns:
      - name: nomor
        description: "Unique putusan number"
        tests: [unique, not_null]
      - name: judul
        description: "Full putusan title"
      - name: kategori
        description: "Court case category"
      - name: tahun
        description: "Year of putusan"
      - name: bulan
        description: "Month of putusan"
      - name: tingkat_proses
        description: "Court process level"
      - name: lembaga_peradilan
        description: "Court institution"
      - name: amar
        description: "Court verdict"
      - name: gcs_uri
        description: "GCS URI of the PDF document"
      - name: pdf_pages
        description: "Number of PDF pages"
      - name: pdf_pihak
        description: "Parties involved (from PDF)"
      - name: pdf_isi_ringkas
        description: "Case summary (from PDF)"
      - name: pdf_amar_putusan
        description: "Full verdict text (from PDF)"
      - name: scraped_at
        description: "Timestamp when putusan was scraped"
      - name: run_date
        description: "Partition date"
      - name: dbt_loaded_at
        description: "Timestamp when dbt loaded this row"
